            <h1>12-Graphics</h1>
            <h2>Creates inline graphics with tags.</h2>
        </header>
        <section class="centered">
            <h3>Gráfica de línea con SVG</h3>

<svg width="340" height="240" viewBox="0 0 340 240">
    <!-- Fondo -->
    <rect x="0" y="0" width="340" height="240" fill="white" rx="4" />

    <!-- Líneas horizontales -->
    <g stroke="#eee" stroke-width="1">
        <line x1="40" y1="40" x2="320" y2="40" />
        <line x1="40" y1="80" x2="320" y2="80" />
        <line x1="40" y1="120" x2="320" y2="120" />
        <line x1="40" y1="160" x2="320" y2="160" />
    </g>

    <!-- Eje inferior -->
    <line x1="40" y1="200" x2="320" y2="200" stroke="#ddd" stroke-width="1" />

    <!-- Línea del gráfico -->
    <polyline 
        fill="none" 
        stroke="#ff6b6b" 
        stroke-width="3"
        points="70,160 135,120 200,140 265,60" />

    <!-- Puntos -->
    <g fill="#ff6b6b">
        <circle cx="70" cy="160" r="4"/>
        <circle cx="135" cy="120" r="4"/>
        <circle cx="200" cy="140" r="4"/>
        <circle cx="265" cy="60" r="4"/>
    </g>

    <!-- Etiquetas meses -->
    <g font-size="10" fill="#333" font-family="sans-serif" text-anchor="middle">
        <text x="70" y="215">Enero</text>
        <text x="135" y="215">Febrero</text>
        <text x="200" y="215">Marzo</text>
        <text x="265" y="215">Abril</text>
    </g>
</svg>
            <h3>Figuras con SVG</h3>

            <svg width="340" height="240" viewBox="0 0 340 240">
                <!-- Fondo del gráfico -->
                <rect x="0" y="0" width="340" height="240" fill="white" rx="4" />

                <g stroke="#eee" stroke-width="1">
                    <line x1="40" y1="40" x2="320" y2="40" />
                    <line x1="40" y1="80" x2="320" y2="80" />
                    <line x1="40" y1="120" x2="320" y2="120" />
                    <line x1="40" y1="160" x2="320" y2="160" />
                </g>

                <g font-size="10" fill="#666" font-family="sans-serif" text-anchor="end">
                    <text x="35" y="43">4,0</text>
                    <text x="35" y="83">3,0</text>
                    <text x="35" y="123">2,0</text>
                    <text x="35" y="163">1,0</text>
                    <text x="35" y="203">0</text>
                </g>

                <line x1="40" y1="200" x2="320" y2="200" stroke="#ddd" stroke-width="1" />

                <g fill="#add8e6" fill-opacity="0.6" stroke="#87ceeb" stroke-width="1">
                    
                    <rect x="55" y="160" width="45" height="40" />
                    
                    <rect x="120" y="120" width="45" height="80" />
                    
                    <rect x="185" y="80" width="45" height="120" />
                    
                    <rect x="250" y="40" width="45" height="160" />
                </g>

                <g font-size="10" fill="#333" font-family="sans-serif" text-anchor="middle">
                    <text x="77" y="215">Enero</text>
                    <text x="142" y="215">Febrero</text>
                    <text x="207" y="215">Marzo</text>
                    <text x="272" y="215">Abril</text>
                </g>
            </svg>
