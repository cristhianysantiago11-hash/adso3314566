<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>16-Semantic</title>
    <link rel="stylesheet" href="../02-html/styles1.css">
</head>
<style>
    body {
        font-family: Arial, sans-serif;
    }

    /* contenedor */
    .contenedor {
        width: 600px;
        margin: 40px auto;
        background: #333333;
        padding: 5px;
        border-radius: 10px;
    }

    /* todos los bloques */
    header, nav, article, section, aside, footer {
        background: #000000;
        color: #f8872b;
        text-align: center;
        padding: 20px;
        border-radius: 10px;
        margin-bottom: 10px;
    }

    .contenido {
        display: flex;
        gap: 10px;
    }

    article {
        flex: 2;
        display: flex;
        flex-direction: column;
        gap: px;
    }

    section {
        background: #444;
        padding: 30px;
    }

    aside {
        flex: 1;
    }
</style>
<body>
    <a href="../02-html/2-index.html" class="btn-home">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="#ffff" viewBox="0 0 256 256"><path d="M232,200a8,8,0,0,1-16,0,88.1,88.1,0,0,0-88-88H51.31l34.35,34.34a8,8,0,0,1-11.32,11.32l-48-48a8,8,0,0,1,0-11.32l48-48A8,8,0,0,1,85.66,61.66L51.31,96H128A104.11,104.11,0,0,1,232,200Z">
        </path>
    </svg>
    </a>
    
    <main>
        <header>
            <h1>16-Semantic</h1> <br>
            <h2>Defines layout with semantic tags (new style).</h2>
        </header>
    <section>
        <h3>Structure</h3>
        <p>The &lt;div&gt; element is used to group HTML elements together and apply styles to them.</p>
        <div class="contenedor">
            <header>&lt;header&gt;</header>
            <nav>&lt;nav&gt;</nav>

            <main class="contenido">
                <article>
                    &lt;article&gt;
                    <section style="color: white;">&lt;section&gt;</section>
                </article>

                <aside>&lt;aside&gt;</aside>
            </main>

            <footer>&lt;footer&gt;</footer>
    </div>
    </section>
    </main>
</body>
</html>
